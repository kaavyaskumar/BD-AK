<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary !</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6c1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 4em;
            color: #d4796d;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-style: italic;
            animation: slideIn 0.8s ease-out;
        }

        p {
            font-size: 1.5em;
            color: #9f7f7a;
            margin-bottom: 40px;
            line-height: 1.6;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .heart-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            font-size: 3em;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .heart-row span {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        button {
            background: linear-gradient(135deg, #ff9999 0%, #ff8080 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff69b4;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1>Happy Birthday,Beauti!</h1>
        <p>Today is all about celebrating your Anniversary</p>
        <p> Enojy ur day<p>

        
        
        <div class="heart-row">
            <span>❤️</span>
            <span>💕</span>
            <span>💖</span>
            <span>💗</span>
            <span>❤️</span>
        </div>
        
        <button onclick="celebrate()">🎉 Start the Celebration</button>
    </div>

    <script>
        // Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('hearts').appendChild(heart);
        }

        // Initialize hearts
        for (let i = 0; i < 15; i++) {
            createHeart();
        }

        // Celebration function
        function celebrate() {
            const colors = ['#ff69b4', '#ff1493', '#ff69b4', '#ffb6c1'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.display = 'block';
                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.style.transition = 'all 2s ease-out';
                    confetti.style.transform = `translate(${Math.random() * 400 - 200}px, ${Math.random() * 400 + 100}px)`;
                    confetti.style.opacity = '0';
                }, 10);

                setTimeout(() => confetti.remove(), 2100);
            }

            // Optional: Sound effect (uncomment if you want)
            // playSound();
        }
    </script>
</body>
</html>
